---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  # namespace: tr-vwjltcj0t5
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: nginx
  rules:
  - host: blablabook.tritons.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
  tls: 
    - host: 
      - blablabook.tritons.io
      secretName: ingress-tls
