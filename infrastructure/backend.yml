---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      volumes:
        - name: secret-volume
          secret:
            secretName: secret-back
      containers:
        - name: backend
          image: royjade/blablabook-back
          ports:
          - containerPort: 3000
          env: 
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: secret-back
                key: DB_USER
          - name: DB_HOST
            valueFrom:
                secretKeyRef:
                  name: secret-back
                  key: DB_HOST
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: secret-back
                key: DB_PASSWORD
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: secret-back
                key: JWT_SECRET
          - name: PORT
            value: "3000"
          - name: DB_PORT
            value: "32135"
          - name: DB_NAME
            value: blablabook
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-back 
type: Opaque
stringData:
  DB_HOST: '{{ DB_HOST }}'
  DB_USER: '{{ DB_USER }}'
  DB_PASSWORD: '{{ DB_PASSWORD }}'
  JWT_SECRET: '{{ JWT_SECRET }}'
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
