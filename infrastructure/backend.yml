---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      volumes:
        - name: secret-volume
          secret:
            secretName: secret-back
      containers:
        - name: backend
          image: royjade/blablabook-back
          ports:
          - containerPort: 3000
          env:
          - name: PORT
            value: "3000"
          - name: DB_PORT
            value: "32135"
          - name: DB_NAME
            value: blablabook
          volumeMounts:
            - name: secret-volume
              readOnly: true
              mountPath: "/etc/secret-volume"
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-back 
type: Opaque
stringData:
  DB_HOST: '{{ DB_HOST }}'
  DB_USER: '{{ DB_USER }}'
  DB_PASSWORD: '{{ DB_PASSWORD }}'
  JWT_SECRET: '{{ JWT_SECRET }}'
