---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: royjade/blablabook-front
          ports:
          - containerPort: 1234
          env:
          - name: PORT
            value: "1234"
          resources:
            requests:
              # memory: 64Mi
              cpu: 50m
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 1234
